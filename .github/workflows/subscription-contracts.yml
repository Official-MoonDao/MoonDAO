name: SubscriptionContracts

on:
  push:
    branches: [main]
    paths:
      - subscription-contracts/**
  pull_request:
    branches: [main]
    paths:
      - subscription-contracts/**

env:
  FOUNDRY_PROFILE: default

jobs:
  check:
    strategy:
      fail-fast: true

    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Cache git
        uses: actions/cache@v3
        with:
          path: |
            .git
          key: key-${{ runner.os }}-git-
          restore-keys: |
            key-${{ runner.os }}-git-

      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Cache node
        uses: actions/cache@v3
        with:
          path: |
            subscription-contracts/node_modules
          key: key-${{ runner.os }}-npm-${{ hashFiles('subscription-contracts/package-lock.json') }}
          restore-keys: |
            key-${{ runner.os }}-npm-

      - name: Cache forge
        uses: actions/cache@v3
        with:
          path: |
            subscription-contracts/out
          key: key-${{ runner.os }}-forge-${{ hashFiles('subscription-contracts/foundry.toml') }}
          restore-keys: |
            key-${{ runner.os }}-forge-


      - name: Run apply_patch.sh
        run: |
          chmod +x ./subscription-contracts/apply_patch.sh
          ./subscription-contracts/apply_patch.sh

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # The upstream fork RPC can flake, killing anvil silently at startup; without a
      # health check the job only discovers the dead port ~10 minutes later when
      # `forge coverage --fork-url 127.0.0.1:854x` gets "connection refused".
      # Retry the launch and block until the RPC actually answers.
      - name: Run Local Sepolia Chain with Anvil
        run: |
          start_anvil() {
            local port=$1; shift
            for attempt in 1 2 3; do
              "$@" &
              local pid=$!
              for i in $(seq 1 15); do
                if cast chain-id --rpc-url "http://127.0.0.1:${port}" >/dev/null 2>&1; then
                  echo "anvil ready on port ${port} (attempt ${attempt})"
                  return 0
                fi
                sleep 2
              done
              echo "anvil not responding on port ${port} (attempt ${attempt}); retrying"
              kill "$pid" 2>/dev/null || true
              sleep 2
            done
            echo "anvil failed to start on port ${port} after 3 attempts"
            return 1
          }
          start_anvil 8545 anvil --fork-url https://11155111.rpc.thirdweb.com/${{ secrets.THIRDWEB_CLIENT_ID }}
        id: local-sepolia

      - name: Run Local Arbitrum Chain with Anvil
        run: |
          start_anvil() {
            local port=$1; shift
            for attempt in 1 2 3; do
              "$@" &
              local pid=$!
              for i in $(seq 1 15); do
                if cast chain-id --rpc-url "http://127.0.0.1:${port}" >/dev/null 2>&1; then
                  echo "anvil ready on port ${port} (attempt ${attempt})"
                  return 0
                fi
                sleep 2
              done
              echo "anvil not responding on port ${port} (attempt ${attempt}); retrying"
              kill "$pid" 2>/dev/null || true
              sleep 2
            done
            echo "anvil failed to start on port ${port} after 3 attempts"
            return 1
          }
          start_anvil 8546 anvil --fork-url https://42161.rpc.thirdweb.com/${{ secrets.THIRDWEB_CLIENT_ID }} --port 8546
        id: local-arbitrum

      - name: Install npm dependencies
        run: |
          cd subscription-contracts && npm install --legacy-peer-deps
        id: install-npm-dependencies

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Run Forge build
        run: |
          forge --version
          cd subscription-contracts && forge build --sizes --via-ir --optimize --optimizer-runs 200
        id: build

      - name: Run Forge tests
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          FOUNDRY_DISABLE_NIGHTLY_WARNING: true
        run: |
          cd subscription-contracts
          forge coverage --via-ir --fork-url 127.0.0.1:8545 -vvvv --optimize --optimizer-runs 10000 --ir-minimum --show-progress --report lcov --report-file sepolia-coverge.info
          forge coverage --via-ir --fork-url 127.0.0.1:8546 -vvvv --optimize --optimizer-runs 10000 --ir-minimum --show-progress --report lcov --report-file arbitrum-coverge.info
          lcov -a sepolia-coverge.info -a arbitrum-coverge.info -o coverage.info
        id: test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Official-MoonDao/MoonDAO
        id: upload-coverage
