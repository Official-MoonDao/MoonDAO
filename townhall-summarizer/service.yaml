apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: townhall-summarizer
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "4"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 1
      timeoutSeconds: 3600
      containers:
        # ── Main container (ingress) ──────────────────────────────
        - name: townhall-summarizer
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 1Gi
              cpu: "2"
          env:
            - name: POT_PROVIDER_URL
              value: "http://localhost:4416"
            - name: YOUTUBE_COOKIE_FILE
              value: "/secrets/youtube-cookies/youtube-cookies.txt"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: groq-api-key
            - name: YOUTUBE_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: youtube-api-key
            - name: ALLOWED_YOUTUBE_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: allowed-youtube-channel-id
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: discord-webhook-url
          volumeMounts:
            - name: youtube-cookies
              mountPath: /secrets/youtube-cookies
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

        # ── PO Token sidecar (bgutil) ────────────────────────────
        - name: bgutil
          image: brainicism/bgutil-ytdlp-pot-provider:latest
          resources:
            limits:
              memory: 512Mi
              cpu: "0.5"
          startupProbe:
            httpGet:
              path: /ping
              port: 4416
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 10
      volumes:
        - name: youtube-cookies
          secret:
            secretName: youtube-cookies
            items:
              - key: latest
                path: youtube-cookies.txt
