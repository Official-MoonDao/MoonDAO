[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
include_paths = ["../fee-hook/script", "../contracts/src"]
ffi = true
fs_permissions = [
    { access = "read", path = "../contracts/deployments/"},
    { access = "read", path = "./script/safe-tx-mission4-owner-only-payouts.json"},
    { access = "read", path = "./script/backfill/"}
]
# for deterministic deploys
bytecode_hash = "none"
cbor_metadata = false
always_use_create_2_factory = true


[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# See more config options https://github.com/foundry-rs/foundry/tree/master/config
